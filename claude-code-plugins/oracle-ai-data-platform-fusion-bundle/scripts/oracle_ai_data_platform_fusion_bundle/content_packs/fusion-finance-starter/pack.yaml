id: fusion-finance-starter
version: 0.1.0
description: |
  Starter medallion model for Fusion Finance analytics.
  Ships silver dimensions (dim_supplier, dim_account, dim_calendar) and
  gold marts (gl_balance, supplier_spend, ap_aging). v0.3 starter pack
  Phase 1: nodes are declared as `python_legacy` with `migrationTarget`
  pointing at the SQL file Phase 3 will land. Variation points and
  profile defaults are authored against the v1 reference branch's
  registry data (see tests/fixtures/v1_registry_snapshot.yaml).

compatibility:
  pluginMinVersion: 0.3.0
  fusionFamilies:
    - ERP
  aidp:
    requiresDelta: true

defaults:
  sqlDialect: spark-sql
  identifierPolicy: validated-three-part
  runIdColumn:
    bronze: _run_id
    silver: silver_run_id
    gold: gold_run_id

profiles:
  finance-default:
    calendar:
      startDate: '2020-01-01'
      endDate: '2030-12-31'
      fiscalStartMonth: 1
    # NOTE: superseded in Phase 3 by `columnAliases.coa_*_segment` below.
    # These positional-alias names are migration-period redundant — the
    # Phase 3 SQL templates resolve COA segments via `{{ column.coa_*_segment }}`
    # against `resolved.column.*` in the tenant profile, not via
    # `{{ profile.chartOfAccounts.* }}` (the generic profile resolver binds
    # values as parameters, not identifiers). Block stays for Phase 1 / 2
    # validation surface stability; Phase 4+ can remove cleanly.
    chartOfAccounts:
      balancingSegment: segment1
      costCenterSegment: segment2
      naturalAccountSegment: segment3

# Variation points (PLAN §9.5). Bootstrap walks each entry's candidates
# in priority order and pins the first that exists on the tenant.
columnAliases:
  supplier_natural_key:
    appliesTo: bronze.erp_suppliers
    required: true
    candidates:
      - SEGMENT1
  vendor_id:
    appliesTo: bronze.erp_suppliers
    required: true
    candidates:
      - VENDORID
  invoice_currency_code:
    appliesTo: bronze.ap_invoices
    required: true
    candidates:
      - ApInvoicesInvoiceCurrencyCode
      - ApInvoicesCurrencyCode

  # COA segment role → source column. All six CodeCombinationSegmentN columns
  # exist on every Fusion gl_coa extract, so bootstrap's "first column that
  # exists" heuristic cannot pick roles — these are pre-authored in the
  # tenant profile (resolved.column.coa_*_segment). Tenants whose COA places
  # balancing / cost-center / natural-account at higher positions extend the
  # candidate list via a pack overlay. See dim_account.py:109-122 +
  # docs/features/v2-phase-3-export-modules-to-sql/variation_catalog.md.
  coa_balancing_segment:
    appliesTo: bronze.gl_coa
    required: true
    candidates:
      - CodeCombinationSegment1
      - CodeCombinationSegment2
      - CodeCombinationSegment3
      - CodeCombinationSegment4
      - CodeCombinationSegment5
      - CodeCombinationSegment6
  coa_cost_center_segment:
    appliesTo: bronze.gl_coa
    required: true
    candidates:
      - CodeCombinationSegment1
      - CodeCombinationSegment2
      - CodeCombinationSegment3
      - CodeCombinationSegment4
      - CodeCombinationSegment5
      - CodeCombinationSegment6
  coa_natural_account_segment:
    appliesTo: bronze.gl_coa
    required: true
    candidates:
      - CodeCombinationSegment1
      - CodeCombinationSegment2
      - CodeCombinationSegment3
      - CodeCombinationSegment4
      - CodeCombinationSegment5
      - CodeCombinationSegment6

# Semantic variants (PLAN §9.5.1 / §9.5.2). The fragment is substituted
# into `{{ semantic.<name> }}` at render time after bootstrap resolves
# which candidate's `detect.columnExists` matches the tenant.
semanticVariants:
  cancelled_status:
    appliesTo: bronze.ap_invoices
    required: true
    candidates:
      - id: cancelled_date
        detect:
          columnExists: ApInvoicesCancelledDate
        fragment: "{table}.ApInvoicesCancelledDate IS NULL"
      - id: cancelled_flag
        detect:
          columnExists: ApInvoicesCancelledFlag
        fragment: "COALESCE({table}.ApInvoicesCancelledFlag, 'N') != 'Y'"
