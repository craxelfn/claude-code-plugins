# Bronze datasets shipped by fusion-finance-starter@0.1.0.
# Authored from tests/fixtures/v1_registry_snapshot.yaml (parity baseline).
datasets:
  - id: erp_suppliers
    extractor: bicc
    pvo: erp_suppliers
    target: erp_suppliers
    incremental:
      capable: true
      cursorOption: fusion.initial.extract-date
      safetyWindowSeconds: inherit

  - id: ap_invoices
    extractor: bicc
    pvo: ap_invoices
    target: ap_invoices
    incremental:
      capable: true
      cursorOption: fusion.initial.extract-date
      safetyWindowSeconds: inherit

  - id: gl_coa
    extractor: bicc
    pvo: gl_coa
    target: gl_coa
    incremental:
      capable: true
      cursorOption: fusion.initial.extract-date
      safetyWindowSeconds: inherit

  - id: gl_period_balances
    extractor: bicc
    pvo: gl_period_balances
    target: gl_period_balances
    incremental:
      capable: true
      cursorOption: fusion.initial.extract-date
      safetyWindowSeconds: inherit
