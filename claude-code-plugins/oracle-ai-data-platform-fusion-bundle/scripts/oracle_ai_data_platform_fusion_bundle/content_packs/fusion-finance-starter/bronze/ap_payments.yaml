id: ap_payments
layer: bronze
implementation:
  type: bronze_extract
  datastore: FscmTopModelAM.FinExtractAM.ApBiccExtractAM.PaymentHistoryDistributionExtractPVO
  pvo_id: FscmTopModelAM.FinExtractAM.ApBiccExtractAM.PaymentHistoryDistributionExtractPVO
  biccSchema: Financial
  schemaOverride: null
  incrementalCapable: true
  auditColumnsMode: bronze_v1
target: ap_payments
dependsOn:
  bronze: []
  silver: []
refresh:
  seed:
    strategy: replace
  incremental:
    strategy: merge
    watermark:
      source: ap_payments
      column: ApPayHistDistLastUpdateDate
    naturalKey: [ApPayHistDistInvoicePaymentId, ApPayHistDistPaymentHistDistId]
requiredColumns:
  ap_payments:
    - ApPayHistDistInvoicePaymentId
    - ApPayHistDistPaymentHistDistId
    - ApPayHistDistInvoiceId
    - ApPayHistDistAmount
    - ApPayHistDistLastUpdateDate
outputSchema:
  columns:
    - { name: ApPayHistDistInvoicePaymentId, type: long, nullable: true, pii: low }
    - { name: ApPayHistDistPaymentHistDistId, type: long, nullable: true, pii: low }
    - { name: ApPayHistDistInvoiceId, type: long, nullable: true, pii: low }
    - { name: ApPayHistDistAmount, type: "decimal(28,8)", nullable: true, pii: low }
    - { name: ApPayHistDistLastUpdateDate, type: timestamp, nullable: true, pii: none }
    - { name: _extract_ts, type: timestamp, nullable: false, pii: none }
    - { name: _source_pvo, type: string, nullable: false, pii: none }
    - { name: _run_id, type: string, nullable: false, pii: none }
    - { name: _watermark_used, type: timestamp, nullable: true, pii: none }
quality:
  tests: []
