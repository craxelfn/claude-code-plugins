    - { name: CodeCombinationSegment1, type: string, nullable: true, pii: none }
    - { name: CodeCombinationSegment2, type: string, nullable: true, pii: none }
    - { name: CodeCombinationSegment3, type: string, nullable: true, pii: none }
    - { name: CodeCombinationAccountType, type: string, nullable: true, pii: none }
    - { name: CodeCombinationEnabledFlag, type: string, nullable: true, pii: none }
    - { name: CodeCombinationLastUpdateDate, type: timestamp, nullable: true, pii: none }
    - { name: _extract_ts, type: timestamp, nullable: false, pii: none }
    - { name: _source_pvo, type: string, nullable: false, pii: none }
    - { name: _run_id, type: string, nullable: false, pii: none }
    - { name: _watermark_used, type: timestamp, nullable: true, pii: none }
quality:
  tests: []
