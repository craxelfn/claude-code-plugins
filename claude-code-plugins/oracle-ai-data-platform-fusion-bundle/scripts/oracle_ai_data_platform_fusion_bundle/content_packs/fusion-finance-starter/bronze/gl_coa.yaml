  biccSchema: Financial
  schemaOverride: null
  # gl_coa is bucket-config style — full re-extract per cycle.
  incrementalCapable: false
  auditColumnsMode: bronze_v1
target: gl_coa
dependsOn:
  bronze: []
  silver: []
refresh:
