id: po_receipts
layer: bronze
implementation:
  type: bronze_extract
  datastore: FscmTopModelAM.ScmExtractAM.RcvBiccExtractAM.ReceivingReceiptTransactionExtractPVO
  pvo_id: FscmTopModelAM.ScmExtractAM.RcvBiccExtractAM.ReceivingReceiptTransactionExtractPVO
  # PVO lives under ScmExtractAM in the AM-hierarchy but BICC publishes
  # under "Financial" in some tenants. Tenant-dependent; set
  # bundle.fusion.schemaOverrides.po_receipts to override.
  biccSchema: Financial
  schemaOverride: null
  incrementalCapable: true
  auditColumnsMode: bronze_v1
target: po_receipts
dependsOn:
  bronze: []
  silver: []
refresh:
  seed:
    strategy: replace
  incremental:
    strategy: merge
    watermark:
      source: po_receipts
      column: RcvTransactionsLastUpdateDate
    naturalKey: [RcvTransactionsTransactionId]
requiredColumns:
  po_receipts:
    - RcvTransactionsTransactionId
    - RcvTransactionsPoHeaderId
    - RcvTransactionsQuantity
    - RcvTransactionsLastUpdateDate
outputSchema:
  columns:
    - { name: RcvTransactionsTransactionId, type: long, nullable: true, pii: none }
    - { name: RcvTransactionsPoHeaderId, type: long, nullable: true, pii: none }
    - { name: RcvTransactionsQuantity, type: "decimal(28,8)", nullable: true, pii: low }
    - { name: RcvTransactionsTransactionDate, type: timestamp, nullable: true, pii: none }
    - { name: RcvTransactionsLastUpdateDate, type: timestamp, nullable: true, pii: none }
    - { name: _extract_ts, type: timestamp, nullable: false, pii: none }
    - { name: _source_pvo, type: string, nullable: false, pii: none }
    - { name: _run_id, type: string, nullable: false, pii: none }
    - { name: _watermark_used, type: timestamp, nullable: true, pii: none }
quality:
  tests: []
