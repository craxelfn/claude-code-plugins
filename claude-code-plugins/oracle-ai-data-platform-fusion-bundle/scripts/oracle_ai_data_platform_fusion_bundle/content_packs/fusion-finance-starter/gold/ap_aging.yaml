id: ap_aging
layer: gold
implementation:
  type: sql
  sql: gold/ap_aging.sql
target: ap_aging

dependsOn:
  bronze:
    - id: ap_invoices
      watermark:
        column: _extract_ts
  silver:
    - id: dim_supplier

refresh:
  seed:
    strategy: replace
  incremental:
    strategy: replace
    reason: |
      ap_aging buckets are CURRENT_DATE()-anchored. Row-level merge
      would freeze bucket assignments from the prior run; daily
      incremental refresh would go stale by one day every day.
      Hence `replace` (PLAN §10, ADR-0012). A future `snapshot`
      strategy (§10.7, deferred) is the right long-term fit.

# Output schema matches v1 build_ap_aging_sql in proxy mode
# (transforms/gold/ap_aging.py:475-505 with due_date_mode='proxy') —
# 19 columns. Phase 3 ships proxy mode only; real-mode (terms/due_date
# probing) is deferred until a renderer "optional column" feature.
outputSchema:
  columns:
    - name: vendor_id
      type: bigint
      nullable: true
      pii: none
    - name: currency_code
      type: string
      nullable: false
      pii: none
    - name: supplier_number
      type: string
      nullable: true
      pii: low
    - name: supplier_name
      type: string
      nullable: true
      pii: medium
    - name: business_relationship
      type: string
      nullable: true
      pii: none
    - name: age_bucket
      type: string
      nullable: false
      pii: none
    - name: bucket_basis
      type: string
      nullable: false
      pii: none
    - name: open_invoice_count
      type: bigint
      nullable: false
      pii: none
    - name: open_amount
      type: decimal(28,8)
      nullable: true
      pii: none
    - name: invoice_amount_total
      type: decimal(28,8)
      nullable: true
      pii: none
    - name: amount_paid_total
      type: decimal(28,8)
      nullable: true
      pii: none
    - name: credit_open_amount
      type: decimal(28,8)
      nullable: true
      pii: none
    - name: credit_open_count
      type: bigint
      nullable: false
      pii: none
    - name: oldest_invoice_date
      type: date
      nullable: true
      pii: none
    - name: max_days_outstanding
      type: int
      nullable: true
      pii: none
    - name: as_of_date
      type: date
      nullable: false
      pii: none
    - name: bronze_extract_ts
      type: timestamp
      nullable: true
      pii: none
    - name: gold_built_at
      type: timestamp
      nullable: false
      pii: none
    - name: gold_run_id
      type: string
      nullable: true
      pii: none

quality:
  tests:
    - type: not_null
      columns: [supplier_number, age_bucket]
    - type: accepted_values
      column: age_bucket
      values: ["NOT_DUE", "0-30", "31-60", "61-90", "OVER_90"]
