# Phase 4 Step 6 — second tenant profile for multi-tenant parity coverage.
#
# Exercises the v0.3 variation points that finance-default does NOT:
# - `semanticVariants.cancelled_status: cancelled_flag` (vs finance-default's
#   `cancelled_date`). Renders the alternate fragment:
#     COALESCE({table}.ApInvoicesCancelledFlag, 'N') != 'Y'
# - Distinct `snapshotDate` (2025-12-31 vs 2026-06-05) — exercises the
#   `{{ snapshot_date }}` parameter-binding path with a non-default value.
# - Distinct `bronzeSchemaFingerprint` — exercises the §11.6 fingerprint
#   gate's "different profile, different fingerprint" identity contract
#   without claiming a real live-tenant pod's fingerprint.
#
# Does NOT exercise non-conventional COA segment positioning — the v0.3
# pack vocabulary cannot express that override (Phase 3 round-2 hardcoded
# the conventional six-segment shape in silver/dim_account.sql). The COA
# question is an EXPLAINED-DIVERGENCE row in the ship-ready report;
# Phase 5 inherits the requirement when a new `{{ coa.<role> }}`
# renderer token + live-tenant evidence are available.
#
# Field aliases match scripts/oracle_ai_data_platform_fusion_bundle/schema/tenant_profile.py.
schemaVersion: 1
tenant: parity-tenant-b
pinnedAt: 2026-06-05T00:00:00+00:00

# Synthetic fingerprint — distinct from finance-default's placeholder.
# Pair with finance-alt-cancelled-flag.schema-snapshot.yaml whose
# bronzeSchemaFingerprint matches THIS value (Phase 3d contract).
bronzeSchemaFingerprint: "sha256:placeholder-parity-tenant-b-2026-06-05"

resolved:
  column:
    # Same PVO shape as finance-default — the bronze fixture rows in
    # `bronze_fixtures_tenant_b.py` retain the conventional column
    # names; only the cancelled-status semantic varies.
    supplier_natural_key: SEGMENT1
    vendor_id: VENDORID
    invoice_currency_code: ApInvoicesInvoiceCurrencyCode
    coa_balancing_segment: CodeCombinationSegment1
    coa_cost_center_segment: CodeCombinationSegment2
    coa_natural_account_segment: CodeCombinationSegment3
  semantic:
    # ALTERNATE candidate — DIFFERENT from finance-default's
    # `cancelled_date`. Resolves to the SQL fragment that reads
    # ApInvoicesCancelledFlag instead of ApInvoicesCancelledDate.
    cancelled_status: cancelled_flag

# Non-default snapshot date — exercises the `{{ snapshot_date }}`
# parameter-binding path with a value that is NOT the harness default.
# ap_aging buckets pivot off this date, so any rendering bug would
# show up as bucket assignments shifting by N days.
profile:
  snapshotDate: '2025-12-31'
  calendar:
    startDate: '2020-01-01'
    endDate: '2030-12-31'
    fiscalStartMonth: 1
