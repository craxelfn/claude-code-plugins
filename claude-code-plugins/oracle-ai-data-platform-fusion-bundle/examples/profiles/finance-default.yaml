# Finance-default tenant profile for the fusion-finance-starter content pack.
#
# Resolved at bootstrap; frozen for subsequent runs. Authored values mirror
# the saasfademo1 demo pod's COA shape — tenants whose COA places balancing /
# cost-center / natural-account at different segment positions override
# `resolved.column.coa_*_segment` to match their layout.
#
# Field aliases match scripts/oracle_ai_data_platform_fusion_bundle/schema/tenant_profile.py.
schemaVersion: 1
tenant: finance-default
pinnedAt: 2026-06-05T00:00:00+00:00

# Placeholder fingerprint — the §11.6 drift gate compares this against the
# live bronze schema each run. Re-run `aidp-fusion-bundle bootstrap` on a
# real tenant to capture the actual sha256.
bronzeSchemaFingerprint: "sha256:placeholder-finance-default-2026-06-05"

# Variation-point resolutions referenced by starter-pack SQL templates.
# The renderer raises AIDPF-5003 at sql_renderer.py:474 / :507 if any of
# these is missing — see docs/features/v2-phase-3-export-modules-to-sql/
# variation_catalog.md for the per-knob audit.
resolved:
  column:
    # dim_supplier
    supplier_natural_key: SEGMENT1
    vendor_id: VENDORID
    # supplier_spend + ap_aging
    invoice_currency_code: ApInvoicesInvoiceCurrencyCode
    # dim_account COA segment roles. Source columns on bronze.gl_coa are
    # CodeCombinationSegment1..30; the role-to-position mapping is a tenant
    # config call (all six columns exist on every Fusion extract), NOT a
    # bootstrap probe — see variation_catalog.md "Bootstrap nuance".
    coa_balancing_segment: CodeCombinationSegment1
    coa_cost_center_segment: CodeCombinationSegment2
    coa_natural_account_segment: CodeCombinationSegment3
  semantic:
    # ap_aging cancelled-invoice detection. The `cancelled_date` candidate
    # uses ApInvoicesCancelledDate IS NULL; the alternative `cancelled_flag`
    # candidate uses COALESCE(...CancelledFlag, 'N') != 'Y' for tenants
    # whose extract omits the date column.
    cancelled_status: cancelled_date

# Free-form profile block — consumed by the renderer's `{{ profile.<key> }}`,
# `{{ snapshot_date }}` tokens, and the dim_calendar builtin adapter.
#
# Delete or comment-out `snapshotDate` to use CURRENT_DATE() in production
# (Phase 3 Step 2 fallback contract). The `calendar:` block here overrides
# pack-level defaults; omitting it falls back to
# pack.pack.profiles.finance-default.calendar.
profile:
  snapshotDate: '2026-06-05'
  calendar:
    startDate: '2020-01-01'
    endDate: '2030-12-31'
    fiscalStartMonth: 1
